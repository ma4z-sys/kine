# ╔═══════════════════════════════════════════╗
# ║         Kine Default Configuration        ║
# ║   Location: ~/.kine/config/kine.conf      ║
# ╚═══════════════════════════════════════════╝

# ─── Runtime Settings ────────────────────────────────────────

# Android image channel: "lineage" (with GApps) or "vanilla"
# "lineage" includes Google Play Services
KINE_CHANNEL=lineage

# System architecture (auto-detected if not set)
# Options: x86_64, arm64
# KINE_ARCH=x86_64

# Session startup timeout in seconds
KINE_SESSION_TIMEOUT=30

# ─── Display Settings ─────────────────────────────────────────

# Display backend: "auto", "wayland", or "x11"
# "auto" will detect the active display server
KINE_DISPLAY_BACKEND=auto

# Force software rendering (disable GPU acceleration)
# Useful if you have GPU compatibility issues
KINE_FORCE_SOFTWARE_RENDER=false

# ─── App Settings ─────────────────────────────────────────────

# Auto-install APK if not already installed before launching
KINE_AUTO_INSTALL=true

# Keep APK files in ~/.kine/apps/ after install
KINE_KEEP_APKS=true

# ─── Network Settings ─────────────────────────────────────────

# Networking mode: "bridge" or "nat"
KINE_NETWORK_MODE=nat

# ─── Audio Settings ───────────────────────────────────────────

# Audio backend: "auto", "pulseaudio", or "pipewire"
KINE_AUDIO_BACKEND=auto

# ─── Logging ──────────────────────────────────────────────────

# Log verbosity: "quiet", "normal", "verbose"
KINE_LOG_LEVEL=normal

# Maximum log file size before rotation (MB)
KINE_LOG_MAX_MB=10
